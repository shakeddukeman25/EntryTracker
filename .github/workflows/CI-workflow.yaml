name: EntryTracker-ci
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  Building:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies and run the app
        run: |
          pip install --no-cache-dir -r requirements.txt
          python app.py &
          sleep 5
      - name: unit test
        run: |
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000)"
          if [ "$STATUS" = "200" ]; then
            echo "Application is up!"
          else
            echo "Application returned $STATUS"
            exit 1
          fi