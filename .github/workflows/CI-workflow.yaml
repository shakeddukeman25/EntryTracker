name: EntryTracker-ci
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies and run the app
        run: |
          pip install --no-cache-dir -r requirements.txt
          python app.py &
          sleep 5
      - name: unit test
        run: |
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000)"
          if [ "$STATUS" = "200" ]; then
            echo "Application is up!"
          else
            echo "Application returned $STATUS"
            exit 1
          fi
  E2E:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker compose up &
          sleep 30
      - name: unit test
        run: |
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80)"
          if [ "$STATUS" = "200" ]; then
            echo "Application is up!"
          else
            echo "Application returned $STATUS"
            exit 1
          fi
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Tag image
        run: docker tag entrytracker:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/entrytracker:latest
      - name: Push image
        run: docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/entrytracker:latest
  Deploy:
    runs-on: ubuntu-latest
    needs: E2E
    steps:
      - name: SSH to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker compose down -v
            cd /home/ubuntu/EntryTracker
            cd ..
            sudo rm -rf EntryTracker
            git clone https://github.com/shakeddukeman25/EntryTracker.git
            cd /home/ubuntu/EntryTracker
            sudo docker compose pull
            sudo docker compose up -d
      - name: verify
        run: |
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.EC2_HOST }})"
          if [ "$STATUS" = "200" ]; then
            echo "Application is up!"
          else
            echo "Application returned $STATUS"
            exit 1
          fi