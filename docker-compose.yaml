version: '3.8'

services:
  app:
    image: 451626663367.dkr.ecr.ap-south-1.amazonaws.com/entrytracker:latest
    container_name: flask-app
    environment:
      - DB_HOST=${DB_HOST}    
      - DB_USER=${DB_USER}    
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    expose:
      - "5000"
    depends_on:
      - mysql
    networks:
      - "app-db"
      - "nginx-test"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:5.7
    container_name: mysql-db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    expose:
      - "3306"
    networks:
      - "app-db"
    volumes:
      - db-data:/var/lib/mysql
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./flask-app/static:/usr/share/nginx/html/static
      - ./flask-app/templates:/usr/share/nginx/html
    depends_on:
      app:
        condition: service_healthy
    networks:
      - "nginx-test"
networks:
  app-db:
    driver: bridge
  nginx-test:
    driver: bridge

volumes:
  db-data: